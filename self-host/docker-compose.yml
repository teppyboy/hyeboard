services:
  chrome:
    image: browserless/chrome:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=120000

  workerd:
    build:
      context: ..
      dockerfile: self-host/Dockerfile
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - HYEB_SESSION_SECRET=${HYEB_SESSION_SECRET:?set HYEB_SESSION_SECRET in self-host/.env}
      - HYEB_ALLOWED_ORIGINS=${HYEB_ALLOWED_ORIGINS:-http://localhost:8080}
      # Points the uet Google-login-automation flow at the headless-Chrome
      # container instead of Cloudflare's Browser Rendering binding - see
      # packages/university-adapters/src/uet/google-login-automation.ts's
      # BrowserConnection "self-hosted" branch (puppeteer-core .connect(),
      # flagged NEEDS VERIFICATION - never tested against a real self-hosted
      # setup).
      - HYEB_BROWSER_WS_ENDPOINT=ws://chrome:3000
    depends_on:
      - chrome
